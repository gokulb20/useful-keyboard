name: "Release (Unsigned)"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: macos-aarch64-apple-darwin

      - name: Install frontend dependencies
        run: bun install

      - name: Build with Tauri (macOS ARM64)
        run: bun run tauri build --target aarch64-apple-darwin
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts
        shell: bash
        run: |
          DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          cp "$DMG" "UsefulKeyboard-${{ steps.version.outputs.version }}-mac-arm64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: "UsefulKeyboard-*.dmg"

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Enable long paths
        shell: pwsh
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: windows-x86_64-pc-windows-msvc

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Install frontend dependencies
        run: bun install

      - name: Shorten build path
        shell: pwsh
        run: |
          $drive = Split-Path -Qualifier $env:GITHUB_WORKSPACE
          $targetDir = "$drive\t"
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          echo "CARGO_TARGET_DIR=$targetDir" >> $env:GITHUB_ENV

      - name: Build with Tauri (Windows x64)
        run: bun run tauri build
        env:
          GGML_NATIVE: "OFF"
          GGML_AVX: "OFF"
          GGML_AVX2: "OFF"
          GGML_FMA: "OFF"
          GGML_F16C: "OFF"

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts
        shell: pwsh
        run: |
          $drive = Split-Path -Qualifier $env:GITHUB_WORKSPACE
          $base = "$drive\t\release\bundle"
          $version = "${{ steps.version.outputs.version }}"

          $msi = Get-ChildItem "$base\msi\*.msi" | Select-Object -First 1
          if ($msi) { Copy-Item $msi.FullName "UsefulKeyboard-$version-windows-x64.msi" }

          $exe = Get-ChildItem "$base\nsis\*.exe" | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName "UsefulKeyboard-$version-windows-x64-setup.exe" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            UsefulKeyboard-*.msi
            UsefulKeyboard-*-setup.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Useful Keyboard ${{ github.ref_name }}"
          files: |
            mac-arm64/*.dmg
            windows-x64/*.msi
            windows-x64/*-setup.exe
          body: |
            ## Useful Keyboard ${{ github.ref_name }}

            **This is an unsigned pre-release.**

            ### macOS
            Download the `.dmg`, open it, drag to Applications.
            On first launch: right-click > Open (bypasses Gatekeeper).

            ### Windows
            Download the `.msi` installer. Windows SmartScreen may warn — click "More info" > "Run anyway".
