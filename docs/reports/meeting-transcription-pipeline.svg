<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">Muesli Meeting Transcription Pipeline</title>
  <desc id="desc">Flame-chart-inspired SVG showing live capture, stop-time transcription, transcript merge, summarization, and persistence for the current meeting pipeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f4ec"/>
      <stop offset="100%" stop-color="#efe7d7"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 28px Menlo, Monaco, Consolas, monospace; fill: #111827; }
      .subtitle { font: 400 14px Menlo, Monaco, Consolas, monospace; fill: #374151; }
      .lane-label { font: 700 15px Menlo, Monaco, Consolas, monospace; fill: #111827; }
      .axis-label { font: 600 12px Menlo, Monaco, Consolas, monospace; fill: #475569; }
      .tick { stroke: #cbd5e1; stroke-width: 1; }
      .lane-line { stroke: #d6d3d1; stroke-width: 1; }
      .phase-text { font: 700 13px Menlo, Monaco, Consolas, monospace; fill: #0f172a; }
      .block-text { font: 600 12px Menlo, Monaco, Consolas, monospace; fill: #111827; }
      .small-text { font: 500 11px Menlo, Monaco, Consolas, monospace; fill: #334155; }
      .note-text { font: 500 12px Menlo, Monaco, Consolas, monospace; fill: #1f2937; }
      .legend-text { font: 600 12px Menlo, Monaco, Consolas, monospace; fill: #1f2937; }
      .lane-bg { fill: rgba(255,255,255,0.36); stroke: #d6d3d1; stroke-width: 1; }
      .phase-bg { fill: #ffffff; stroke: #d6d3d1; stroke-width: 1; }
      .callout { fill: #fffaf0; stroke: #d6d3d1; stroke-width: 1; }
      .flow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 6 5; }
      .live { fill: #fca5a5; stroke: #b91c1c; stroke-width: 1; }
      .capture { fill: #fdba74; stroke: #c2410c; stroke-width: 1; }
      .async { fill: #93c5fd; stroke: #1d4ed8; stroke-width: 1; }
      .repair { fill: #c4b5fd; stroke: #6d28d9; stroke-width: 1; }
      .format { fill: #86efac; stroke: #15803d; stroke-width: 1; }
      .llm { fill: #f9a8d4; stroke: #be185d; stroke-width: 1; }
      .persist { fill: #fcd34d; stroke: #a16207; stroke-width: 1; }
      .status { fill: #e2e8f0; stroke: #64748b; stroke-width: 1; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="980" fill="url(#bg)"/>
  <rect x="0" y="0" width="1800" height="78" fill="url(#header)"/>
  <text x="34" y="42" class="title" fill="#f8fafc">Muesli Meeting Pipeline</text>
  <text x="34" y="64" class="subtitle" fill="#dbeafe">Flame-chart-style timeline from startRecording() to rawTranscript, formattedNotes, and persisted meeting row</text>

  <rect x="40" y="100" width="1720" height="74" rx="10" class="phase-bg"/>
  <text x="58" y="126" class="phase-text">Timeline</text>
  <text x="58" y="148" class="small-text">Relative phases rather than wall-clock durations. The long middle section is the in-meeting live loop.</text>

  <line x1="220" y1="152" x2="1670" y2="152" stroke="#475569" stroke-width="2"/>
  <text x="212" y="145" class="axis-label">0</text>
  <text x="296" y="145" class="axis-label">10</text>
  <text x="441" y="145" class="axis-label">20</text>
  <text x="586" y="145" class="axis-label">30</text>
  <text x="731" y="145" class="axis-label">40</text>
  <text x="876" y="145" class="axis-label">50</text>
  <text x="1021" y="145" class="axis-label">60</text>
  <text x="1166" y="145" class="axis-label">70</text>
  <text x="1311" y="145" class="axis-label">80</text>
  <text x="1456" y="145" class="axis-label">90</text>
  <text x="1601" y="145" class="axis-label">100</text>
  <line x1="220" y1="136" x2="220" y2="158" class="tick"/>
  <line x1="365" y1="136" x2="365" y2="158" class="tick"/>
  <line x1="510" y1="136" x2="510" y2="158" class="tick"/>
  <line x1="655" y1="136" x2="655" y2="158" class="tick"/>
  <line x1="800" y1="136" x2="800" y2="158" class="tick"/>
  <line x1="945" y1="136" x2="945" y2="158" class="tick"/>
  <line x1="1090" y1="136" x2="1090" y2="158" class="tick"/>
  <line x1="1235" y1="136" x2="1235" y2="158" class="tick"/>
  <line x1="1380" y1="136" x2="1380" y2="158" class="tick"/>
  <line x1="1525" y1="136" x2="1525" y2="158" class="tick"/>
  <line x1="1670" y1="136" x2="1670" y2="158" class="tick"/>

  <rect x="220" y="112" width="115" height="18" rx="4" class="capture"/>
  <text x="228" y="125" class="small-text">start()</text>
  <rect x="336" y="112" width="812" height="18" rx="4" class="live"/>
  <text x="345" y="125" class="small-text">live capture loop</text>
  <rect x="1149" y="112" width="261" height="18" rx="4" class="async"/>
  <text x="1157" y="125" class="small-text">stop + STT + diarization</text>
  <rect x="1412" y="112" width="112" height="18" rx="4" class="format"/>
  <text x="1420" y="125" class="small-text">merge</text>
  <rect x="1527" y="112" width="95" height="18" rx="4" class="llm"/>
  <text x="1536" y="125" class="small-text">title</text>
  <rect x="1625" y="112" width="96" height="18" rx="4" class="llm"/>
  <text x="1634" y="125" class="small-text">summary</text>
  <rect x="1724" y="112" width="26" height="18" rx="4" class="persist"/>

  <g transform="translate(40,200)">
    <rect x="0" y="0" width="1720" height="520" rx="14" class="phase-bg"/>

    <rect x="16" y="26" width="1688" height="76" rx="8" class="lane-bg"/>
    <rect x="16" y="116" width="1688" height="76" rx="8" class="lane-bg"/>
    <rect x="16" y="206" width="1688" height="76" rx="8" class="lane-bg"/>
    <rect x="16" y="296" width="1688" height="76" rx="8" class="lane-bg"/>
    <rect x="16" y="386" width="1688" height="76" rx="8" class="lane-bg"/>

    <text x="28" y="54" class="lane-label">1. Controller / Session orchestration</text>
    <text x="28" y="144" class="lane-label">2. Live mic path</text>
    <text x="28" y="234" class="lane-label">3. Live system audio path</text>
    <text x="28" y="324" class="lane-label">4. Stop-time post processing</text>
    <text x="28" y="414" class="lane-label">5. Final transcript / notes / persistence</text>

    <line x1="220" y1="24" x2="220" y2="470" class="tick"/>
    <line x1="365" y1="24" x2="365" y2="470" class="tick"/>
    <line x1="510" y1="24" x2="510" y2="470" class="tick"/>
    <line x1="655" y1="24" x2="655" y2="470" class="tick"/>
    <line x1="800" y1="24" x2="800" y2="470" class="tick"/>
    <line x1="945" y1="24" x2="945" y2="470" class="tick"/>
    <line x1="1090" y1="24" x2="1090" y2="470" class="tick"/>
    <line x1="1235" y1="24" x2="1235" y2="470" class="tick"/>
    <line x1="1380" y1="24" x2="1380" y2="470" class="tick"/>
    <line x1="1525" y1="24" x2="1525" y2="470" class="tick"/>
    <line x1="1670" y1="24" x2="1670" y2="470" class="tick"/>

    <rect x="220" y="56" width="110" height="26" rx="4" class="capture"/>
    <text x="228" y="73" class="block-text">startMeetingRecording</text>
    <rect x="333" y="56" width="220" height="26" rx="4" class="capture"/>
    <text x="341" y="73" class="block-text">MeetingSession.start()</text>
    <rect x="555" y="56" width="593" height="26" rx="4" class="status"/>
    <text x="563" y="73" class="block-text">meeting active: status bar + floating indicator + callbacks wired</text>
    <rect x="1149" y="56" width="108" height="26" rx="4" class="status"/>
    <text x="1158" y="73" class="block-text">stop()</text>

    <rect x="333" y="146" width="178" height="26" rx="4" class="live"/>
    <text x="342" y="163" class="block-text">StreamingMicRecorder</text>
    <rect x="514" y="146" width="146" height="26" rx="4" class="capture"/>
    <text x="523" y="163" class="block-text">appendMic to retained WAV</text>
    <rect x="664" y="146" width="165" height="26" rx="4" class="live"/>
    <text x="673" y="163" class="block-text">AEC processCapture()</text>
    <rect x="832" y="146" width="182" height="26" rx="4" class="live"/>
    <text x="841" y="163" class="block-text">processed chunk file append</text>
    <rect x="1017" y="146" width="130" height="26" rx="4" class="live"/>
    <text x="1026" y="163" class="block-text">VAD on cleaned mic</text>
    <rect x="871" y="178" width="92" height="20" rx="4" class="async"/>
    <text x="879" y="192" class="small-text">rotate chunk</text>
    <rect x="972" y="178" width="88" height="20" rx="4" class="async"/>
    <text x="980" y="192" class="small-text">VAD gate</text>
    <rect x="1068" y="178" width="79" height="20" rx="4" class="async"/>
    <text x="1076" y="192" class="small-text">chunk STT</text>

    <rect x="333" y="236" width="178" height="26" rx="4" class="capture"/>
    <text x="342" y="253" class="block-text">SystemAudioRecorder</text>
    <rect x="514" y="236" width="167" height="26" rx="4" class="capture"/>
    <text x="523" y="253" class="block-text">appendSystem to retained WAV</text>
    <rect x="684" y="236" width="145" height="26" rx="4" class="live"/>
    <text x="693" y="253" class="block-text">AEC appendRender()</text>
    <rect x="832" y="236" width="315" height="26" rx="4" class="capture"/>
    <text x="841" y="253" class="block-text">full system WAV kept untouched for stop-time batch STT + diarization</text>

    <rect x="1149" y="326" width="85" height="26" rx="4" class="capture"/>
    <text x="1158" y="343" class="block-text">flush + stop IO</text>
    <rect x="1237" y="326" width="88" height="26" rx="4" class="async"/>
    <text x="1245" y="343" class="block-text">final mic chunk</text>
    <rect x="1328" y="326" width="132" height="26" rx="4" class="async"/>
    <text x="1337" y="343" class="block-text">system batch STT</text>
    <rect x="1386" y="358" width="103" height="20" rx="4" class="repair"/>
    <text x="1394" y="372" class="small-text">system diarization</text>
    <rect x="1245" y="358" width="136" height="20" rx="4" class="async"/>
    <text x="1254" y="372" class="small-text">drain in-flight chunk tasks</text>
    <rect x="1463" y="326" width="94" height="26" rx="4" class="repair"/>
    <text x="1471" y="343" class="block-text">mic repair pass</text>
    <rect x="1560" y="326" width="118" height="26" rx="4" class="repair"/>
    <text x="1568" y="343" class="block-text">full mic fallback</text>

    <rect x="1412" y="416" width="112" height="26" rx="4" class="format"/>
    <text x="1421" y="433" class="block-text">merge streams</text>
    <rect x="1527" y="416" width="95" height="26" rx="4" class="llm"/>
    <text x="1536" y="433" class="block-text">generate title</text>
    <rect x="1625" y="416" width="96" height="26" rx="4" class="llm"/>
    <text x="1634" y="433" class="block-text">summarize</text>
    <rect x="1724" y="416" width="61" height="26" rx="4" class="persist"/>
    <text x="1732" y="433" class="block-text">persist</text>

    <rect x="1412" y="448" width="196" height="20" rx="4" class="format"/>
    <text x="1421" y="462" class="small-text">rawTranscript = TranscriptFormatter.merge(...)</text>
    <rect x="1610" y="448" width="175" height="20" rx="4" class="persist"/>
    <text x="1619" y="462" class="small-text">DictationStore.insertMeeting + optional save prompt</text>

    <path d="M1110 189 C1160 189, 1180 338, 1237 338" class="flow dashed"/>
    <path d="M1147 249 C1210 249, 1290 338, 1328 338" class="flow dashed"/>
    <path d="M1557 339 C1536 339, 1508 424, 1468 424" class="flow"/>
    <path d="M1524 429 C1534 429, 1548 429, 1562 429" class="flow"/>
    <path d="M1622 429 C1631 429, 1647 429, 1660 429" class="flow"/>
    <path d="M1721 429 C1727 429, 1731 429, 1738 429" class="flow"/>
  </g>

  <g transform="translate(40,742)">
    <rect x="0" y="0" width="1040" height="194" rx="12" class="callout"/>
    <text x="20" y="28" class="phase-text">What each long block means</text>
    <text x="20" y="56" class="note-text">1. Live mic path: raw mic samples are written to the retained recording, cleaned by WebRTC AEC, chunked, and chunk-transcribed asynchronously during the meeting.</text>
    <text x="20" y="82" class="note-text">2. Live system path: system audio is recorded continuously, fed into the AEC render side, and only batch-transcribed after the meeting stops.</text>
    <text x="20" y="108" class="note-text">3. Stop-time hotspot: final mic chunk STT + full system STT + diarization + mic repair are the main post-meeting latency sources before notes appear.</text>
    <text x="20" y="134" class="note-text">4. rawTranscript is produced before title generation and before summary generation.</text>
    <text x="20" y="160" class="note-text">5. The save-recording prompt happens after DB insertion, during the final persistence stage, not before rawTranscript or summary creation.</text>
  </g>

  <g transform="translate(1100,742)">
    <rect x="0" y="0" width="660" height="194" rx="12" class="callout"/>
    <text x="20" y="28" class="phase-text">Legend</text>
    <rect x="20" y="46" width="20" height="14" rx="3" class="capture"/>
    <text x="52" y="58" class="legend-text">Capture / recorder IO</text>
    <rect x="20" y="74" width="20" height="14" rx="3" class="live"/>
    <text x="52" y="86" class="legend-text">Realtime processing inside live meeting</text>
    <rect x="20" y="102" width="20" height="14" rx="3" class="async"/>
    <text x="52" y="114" class="legend-text">Speech-to-text work on chunks or batch audio</text>
    <rect x="20" y="130" width="20" height="14" rx="3" class="repair"/>
    <text x="52" y="142" class="legend-text">Repair / diarization / fallback logic</text>
    <rect x="340" y="46" width="20" height="14" rx="3" class="format"/>
    <text x="372" y="58" class="legend-text">Merge / transcript formatting</text>
    <rect x="340" y="74" width="20" height="14" rx="3" class="llm"/>
    <text x="372" y="86" class="legend-text">LLM title + summary generation</text>
    <rect x="340" y="102" width="20" height="14" rx="3" class="persist"/>
    <text x="372" y="114" class="legend-text">Database write + optional retained recording save</text>
    <rect x="340" y="130" width="20" height="14" rx="3" class="status"/>
    <text x="372" y="142" class="legend-text">UI / controller state transition</text>
    <text x="20" y="174" class="small-text">Source of truth: MeetingSession.stop() -> rawTranscript -> generateTitle() -> summarize() -> persistCompletedMeetingResult()</text>
  </g>
</svg>
